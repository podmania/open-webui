name: Create image from template

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Package name (must exist in nixpkgs)'
        required: true
        type: string
      upstream:
        description: 'Upstream repo in owner/repo format (e.g. Radarr/Radarr)'
        required: true
        type: string
      api-url:
        description: 'Forge API base URL (e.g. https://api.github.com, https://codeberg.org/api/v1)'
        required: false
        default: 'https://api.github.com'
        type: string
      tag-prefix:
        description: 'Tag prefix to strip (e.g. v, release-)'
        required: false
        default: 'v'
        type: string
      fetcher:
        description: 'Nix fetcher (fetchzip or fetchurl)'
        required: false
        default: 'fetchzip'
        type: choice
        options:
          - fetchzip
          - fetchurl
      fetch-url:
        description: 'Source URL template with ${VERSION} placeholder (e.g. https://github.com/Radarr/Radarr/archive/refs/tags/v${VERSION}.tar.gz)'
        required: true
        type: string
      description:
        description: 'Description (auto-detected from nixpkgs if blank)'
        required: false
        type: string
      ports:
        description: 'Comma-separated ports (e.g. 8080,6881)'
        required: false
        type: string
      volumes:
        description: 'Comma-separated volumes (e.g. /config,/data)'
        required: false
        type: string
      env:
        description: 'Comma-separated env vars (e.g. KEY=value,KEY2=value2)'
        required: false
        type: string
      cmd_args:
        description: 'Comma-separated extra command args (e.g. -data=/config,-nobrowser)'
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Validate package exists in nixpkgs
        run: |
          nix eval nixpkgs#${{ inputs.name }}.meta.description --raw --impure

      - name: Install jinja2
        run: pip install jinja2

      - name: Render templates
        run: python render.py
        env:
          INPUT_NAME: ${{ inputs.name }}
          INPUT_UPSTREAM: ${{ inputs.upstream }}
          INPUT_API_URL: ${{ inputs.api-url }}
          INPUT_TAG_PREFIX: ${{ inputs.tag-prefix }}
          INPUT_FETCHER: ${{ inputs.fetcher }}
          INPUT_FETCH_URL: ${{ inputs.fetch-url }}
          INPUT_DESCRIPTION: ${{ inputs.description }}
          INPUT_PORTS: ${{ inputs.ports }}
          INPUT_VOLUMES: ${{ inputs.volumes }}
          INPUT_ENV: ${{ inputs.env }}
          INPUT_CMD_ARGS: ${{ inputs.cmd_args }}

      - name: Remove template files
        run: rm render.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: initialize ${{ inputs.name }} image from template"
          git push
