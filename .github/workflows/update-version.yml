name: Update version
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      upstream: ${{ steps.read.outputs.upstream }}
      tag-prefix: ${{ steps.read.outputs.tag-prefix }}
      api-url: ${{ steps.read.outputs.api-url }}
      fetcher: ${{ steps.read.outputs.fetcher }}
      fetch-url: ${{ steps.read.outputs.fetch-url }}
    steps:
      - uses: actions/checkout@v6
      - id: read
        run: |
          echo "upstream=$(jq -r '.upstream' config.json)" >> "$GITHUB_OUTPUT"
          echo "tag-prefix=$(jq -r '.tagPrefix' config.json)" >> "$GITHUB_OUTPUT"
          echo "api-url=$(jq -r '.apiUrl' config.json)" >> "$GITHUB_OUTPUT"
          echo "fetcher=$(jq -r '.fetcher' config.json)" >> "$GITHUB_OUTPUT"
          echo "fetch-url=$(jq -r '.fetchUrl' config.json)" >> "$GITHUB_OUTPUT"

  update:
    needs: config
    uses: podmania/actions/.github/workflows/update-version.yml@main
    with:
      upstream: ${{ needs.config.outputs.upstream }}
      tag-prefix: ${{ needs.config.outputs.tag-prefix }}
      api-url: ${{ needs.config.outputs.api-url }}
      fetcher: ${{ needs.config.outputs.fetcher }}
      fetch-url: ${{ needs.config.outputs.fetch-url }}
